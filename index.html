<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gh.lirare.xyz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #fafaf9;
    --card-bg: #fff;
    --text: #1c1c1e;
    --dim: rgba(60,60,67,0.55);
    --faint: rgba(60,60,67,0.3);
    --hairline: rgba(0,0,0,0.06);
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-hover: 0 8px 30px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
  }

  body {
    background: var(--bg);
    font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Subtle grain texture */
  .grain {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  /* Gradient blobs */
  .blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .blob {
    position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.5;
    animation: blobFloat 24s ease-in-out infinite;
  }
  .blob-1 { width: 600px; height: 600px; background: #fef3c7; top: -250px; right: -150px; }
  .blob-2 { width: 500px; height: 500px; background: #ede9fe; bottom: -200px; left: -150px; animation-delay: -8s; }
  .blob-3 { width: 400px; height: 400px; background: #dbeafe; top: 50%; left: 40%; animation-delay: -16s; }
  @keyframes blobFloat {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px,-30px) scale(1.08); }
    66% { transform: translate(-30px,20px) scale(0.94); }
  }

  /* Particle canvas */
  #fx-canvas {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }

  /* Main */
  .main { position: relative; z-index: 2; max-width: 880px; margin: 0 auto; padding: 10vh 48px 6vh; }

  /* Header */
  .header { margin-bottom: 10vh; }
  .header .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.3em;
    color: #a1a1aa; margin-bottom: 1.5rem;
  }
  .header .eyebrow::before {
    content: ''; width: 24px; height: 2px; border-radius: 1px;
    background: linear-gradient(90deg, #f59e0b, #8b5cf6);
  }
  .header h1 {
    font-size: clamp(2.8rem, 6vw, 4.8rem);
    font-weight: 700; letter-spacing: -0.03em; line-height: 1.08;
    color: #18181b;
  }
  .header h1 .grad {
    background: linear-gradient(135deg, #f59e0b, #d946ef, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    font-size: 1.05rem; font-weight: 400; color: #71717a; margin-top: 0.8rem; letter-spacing: 0.01em;
  }

  /* Accent line */
  .accent-line { margin-top: 1.6rem; display: flex; gap: 6px; }
  .accent-line span { display: block; height: 2px; border-radius: 2px; }
  .accent-line .a1 { width: 56px; background: #f59e0b; }
  .accent-line .a2 { width: 20px; background: #d946ef; }
  .accent-line .a3 { width: 8px; background: #8b5cf6; }

  /* Cards */
  .section-label {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.25em;
    color: #a1a1aa; margin-bottom: 12px;
  }
  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card {
    position: relative; display: flex; align-items: center; gap: 22px;
    padding: 20px 24px;
    background: var(--card-bg);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    text-decoration: none; color: var(--text);
    box-shadow: var(--shadow);
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .card::after {
    content: ''; position: absolute; inset: -1px; border-radius: 15px; z-index: -1;
    background: var(--card-glow); opacity: 0; transition: opacity 0.35s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .card:hover::after { opacity: 1; }

  /* Geo icon */
  .card .geo {
    width: 46px; height: 46px; min-width: 46px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all 0.35s;
  }
  .card:hover .geo { transform: scale(1.08); }

  .card .info { flex: 1; min-width: 0; }
  .card .title {
    font-size: 15px; font-weight: 600; color: #18181b; letter-spacing: -0.01em;
  }
  .card .desc { font-size: 0.8rem; color: #71717a; margin-top: 2px; }

  .card .arr {
    font-size: 0.85rem; color: #d4d4d8; flex-shrink: 0;
    transition: all 0.35s;
  }
  .card:hover .arr { color: #52525b; transform: translateX(3px); }

  /* Card accent colors */
  .card:nth-child(1) { --card-glow: linear-gradient(135deg, rgba(245,158,11,0.1), transparent 50%); }
  .card:nth-child(1) .geo { background: #fef3c7; color: #d97706; }
  .card:nth-child(2) { --card-glow: linear-gradient(135deg, rgba(139,92,246,0.1), transparent 50%); }
  .card:nth-child(2) .geo { background: #ede9fe; color: #7c3aed; }
  .card:nth-child(3) { --card-glow: linear-gradient(135deg, rgba(236,72,153,0.1), transparent 50%); }
  .card:nth-child(3) .geo { background: #fce7f3; color: #db2777; }
  .card:nth-child(4) { --card-glow: linear-gradient(135deg, rgba(59,130,246,0.1), transparent 50%); }
  .card:nth-child(4) .geo { background: #dbeafe; color: #2563eb; }
  .card:nth-child(5) { --card-glow: linear-gradient(135deg, rgba(16,185,129,0.1), transparent 50%); }
  .card:nth-child(5) .geo { background: #d1fae5; color: #059669; }
  .card:nth-child(6) { --card-glow: linear-gradient(135deg, rgba(14,165,233,0.1), transparent 50%); }
  .card:nth-child(6) .geo { background: #e0f2fe; color: #0284c7; }
  .card:nth-child(7) { --card-glow: linear-gradient(135deg, rgba(249,115,22,0.1), transparent 50%); }
  .card:nth-child(7) .geo { background: #fff7ed; color: #ea580c; }

  /* Divider */
  .divider { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
  .divider .dia { width: 6px; height: 6px; border: 1.5px solid #d4d4d8; transform: rotate(45deg); }
  .divider .rule { flex: 1; height: 1px; background: #e4e4e7; }

  /* Footer */
  .footer {
    margin-top: 10vh; padding-top: 24px; border-top: 1px solid #e4e4e7;
    display: flex; justify-content: space-between;
    font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; color: #a1a1aa;
  }
  .footer a { color: #71717a; text-decoration: none; }
  .footer a:hover { color: #18181b; }

  @media (max-width: 768px) {
    .main { padding: 6vh 20px 5vh; }
    .card { padding: 16px 14px; gap: 14px; }
    .card .geo { width: 38px; height: 38px; min-width: 38px; font-size: 15px; border-radius: 10px; }
    .card .arr { display: none; }
  }
</style>

<body>

<script>
// Particle constellation network
const canvas = document.getElementById('fx-canvas');
const ctx = canvas.getContext('2d');
const PALETTE = ['#f59e0b','#d946ef','#8b5cf6','#3b82f6','#ec4899','#f97316','#14b8a6'];
const PARTICLE_COUNT = 200;
const ACTIVATE_RADIUS = 250;
const LINK_RADIUS = 130;

let particles = [];
let mouseX = -1000, mouseY = -1000;
let targetMX = 0, targetMY = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initParticles(); });

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      ox: Math.random() * canvas.width,
      oy: Math.random() * canvas.height,
      r: 1.5 + Math.random() * 1.5,
      vx: 0, vy: 0,
      color: PALETTE[Math.floor(Math.random() * PALETTE.length)],
      active: 0
    });
  }
}
initParticles();
window.addEventListener('resize', initParticles);

document.addEventListener('mousemove', e => { targetMX = e.clientX; targetMY = e.clientY; });
document.addEventListener('mouseleave', () => { targetMX = -1000; targetMY = -1000; });

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  mouseX += (targetMX - mouseX) * 0.12;
  mouseY += (targetMY - mouseY) * 0.12;

  // Update particles
  for (const p of particles) {
    const dx = p.x - mouseX;
    const dy = p.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const isActive = dist < ACTIVATE_RADIUS;

    // Activation level (lerp toward 0 or 1)
    p.active += ((isActive ? 1 : 0) - p.active) * 0.08;

    if (isActive) {
      // Push away from cursor
      const force = (1 - dist / ACTIVATE_RADIUS) * 2;
      p.vx += (dx / (dist + 1)) * force * 0.3;
      p.vy += (dy / (dist + 1)) * force * 0.3;
    }

    // Random drift
    p.vx += (Math.random() - 0.5) * 0.15;
    p.vy += (Math.random() - 0.5) * 0.15;

    // Spring back to origin
    p.vx += (p.ox - p.x) * 0.003;
    p.vy += (p.oy - p.y) * 0.003;

    // Damping
    p.vx *= 0.94;
    p.vy *= 0.94;

    p.x += p.vx;
    p.y += p.vy;
  }

  // Draw connections (between active particles)
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a = particles[i], b = particles[j];
      const act = Math.min(a.active, b.active);
      if (act < 0.1) continue;
      const dx = a.x - b.x, dy = a.y - b.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < LINK_RADIUS) {
        const alpha = (1 - d / LINK_RADIUS) * 0.35 * act;
        ctx.strokeStyle = `rgba(150,140,170,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }

  // Draw particles
  for (const p of particles) {
    const r = p.r + p.active * 3;
    const alpha = 0.15 + p.active * 0.7;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,100,120,${alpha * 0.5})`;
    ctx.fill();

    if (p.active > 0.15) {
      // Color glow
      ctx.beginPath();
      ctx.arc(p.x, p.y, r + 2, 0, Math.PI * 2);
      const colorAlpha = p.active * 0.7;
      ctx.fillStyle = p.color.replace(')', `, ${colorAlpha})`).replace('rgb', 'rgba');
      if (p.color.startsWith('#')) {
        const hex = p.color;
        const ri = parseInt(hex.slice(1,3), 16);
        const gi = parseInt(hex.slice(3,5), 16);
        const bi = parseInt(hex.slice(5,7), 16);
        ctx.fillStyle = `rgba(${ri},${gi},${bi},${colorAlpha})`;
      }
      ctx.fill();
    }
  }

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>

</body>
