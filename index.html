<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gh.lirare.xyz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #fafaf9;
    --card-bg: #fff;
    --text: #1c1c1e;
    --dim: rgba(60,60,67,0.55);
    --faint: rgba(60,60,67,0.3);
    --hairline: rgba(0,0,0,0.06);
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-hover: 0 8px 30px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
  }

  body {
    background: var(--bg);
    font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Subtle grain texture */
  .grain {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  /* Gradient blobs */
  .blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .blob {
    position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.5;
    animation: blobFloat 24s ease-in-out infinite;
  }
  .blob-1 { width: 600px; height: 600px; background: #fef3c7; top: -250px; right: -150px; }
  .blob-2 { width: 500px; height: 500px; background: #ede9fe; bottom: -200px; left: -150px; animation-delay: -8s; }
  .blob-3 { width: 400px; height: 400px; background: #dbeafe; top: 50%; left: 40%; animation-delay: -16s; }
  @keyframes blobFloat {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px,-30px) scale(1.08); }
    66% { transform: translate(-30px,20px) scale(0.94); }
  }

  /* Particle canvas */
  #fx-canvas {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }

  /* Main */
  .main { position: relative; z-index: 2; max-width: 880px; margin: 0 auto; padding: 10vh 48px 6vh; }

  /* Header */
  .header { margin-bottom: 10vh; }
  .header .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.3em;
    color: #a1a1aa; margin-bottom: 1.5rem;
  }
  .header .eyebrow::before {
    content: ''; width: 24px; height: 2px; border-radius: 1px;
    background: linear-gradient(90deg, #f59e0b, #8b5cf6);
  }
  .header h1 {
    font-size: clamp(2.8rem, 6vw, 4.8rem);
    font-weight: 700; letter-spacing: -0.03em; line-height: 1.08;
    color: #18181b;
  }
  .header h1 .grad {
    background: linear-gradient(135deg, #f59e0b, #d946ef, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    font-size: 1.05rem; font-weight: 400; color: #71717a; margin-top: 0.8rem; letter-spacing: 0.01em;
  }

  /* Accent line */
  .accent-line { margin-top: 1.6rem; display: flex; gap: 6px; }
  .accent-line span { display: block; height: 2px; border-radius: 2px; }
  .accent-line .a1 { width: 56px; background: #f59e0b; }
  .accent-line .a2 { width: 20px; background: #d946ef; }
  .accent-line .a3 { width: 8px; background: #8b5cf6; }

  /* Cards */
  .section-label {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.25em;
    color: #a1a1aa; margin-bottom: 12px;
  }
  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card {
    position: relative; display: flex; align-items: center; gap: 22px;
    padding: 20px 24px;
    background: var(--card-bg);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    text-decoration: none; color: var(--text);
    box-shadow: var(--shadow);
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .card::after {
    content: ''; position: absolute; inset: -1px; border-radius: 15px; z-index: -1;
    background: var(--card-glow); opacity: 0; transition: opacity 0.35s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .card:hover::after { opacity: 1; }

  /* Geo icon */
  .card .geo {
    width: 46px; height: 46px; min-width: 46px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all 0.35s;
  }
  .card:hover .geo { transform: scale(1.08); }

  .card .info { flex: 1; min-width: 0; }
  .card .title {
    font-size: 15px; font-weight: 600; color: #18181b; letter-spacing: -0.01em;
  }
  .card .desc { font-size: 0.8rem; color: #71717a; margin-top: 2px; }

  .card .arr {
    font-size: 0.85rem; color: #d4d4d8; flex-shrink: 0;
    transition: all 0.35s;
  }
  .card:hover .arr { color: #52525b; transform: translateX(3px); }

  /* Card accent colors — inline styles used instead, no nth-child needed */

  /* Divider */
  .divider { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
  .divider .dia { width: 6px; height: 6px; border: 1.5px solid #d4d4d8; transform: rotate(45deg); }
  .divider .rule { flex: 1; height: 1px; background: #e4e4e7; }

  /* Footer */
  .footer {
    margin-top: 10vh; padding-top: 24px; border-top: 1px solid #e4e4e7;
    display: flex; justify-content: space-between;
    font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; color: #a1a1aa;
  }
  .footer a { color: #71717a; text-decoration: none; }
  .footer a:hover { color: #18181b; }

  @media (max-width: 768px) {
    .main { padding: 6vh 20px 5vh; }
    .card { padding: 16px 14px; gap: 14px; }
    .card .geo { width: 38px; height: 38px; min-width: 38px; font-size: 15px; border-radius: 10px; }
    .card .arr { display: none; }
  }
</style>
</head>
<body>

<canvas id="fx-canvas"></canvas>
<div class="grain"></div>
<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<main class="main">

  <header class="header">
    <div class="eyebrow">GH.LIRARE.XYZ</div>
    <h1>游戏社群<span class="grad">洞察</span></h1>
    <div class="subtitle">数据分析与产品优化报告集</div>
    <div class="accent-line">
      <span class="a1"></span><span class="a2"></span><span class="a3"></span>
    </div>
  </header>

  <div class="section-label">分析报告</div>
  <div class="cards">

    <a class="card" href="/chat-report/" style="--card-glow: linear-gradient(135deg, rgba(245,158,11,0.1), transparent 50%);">
      <div class="geo" style="background:#fef3c7;color:#d97706;">&#9670;</div>
      <div class="info">
        <div class="title">修行那些年 · 聊天数据分析</div>
        <div class="desc">活跃度趋势、话题分布、关键词追踪与运营建议</div>
      </div>
      <span class="arr">&#8594;</span>
    </a>

    <a class="card" href="/chat-analysis/" style="--card-glow: linear-gradient(135deg, rgba(16,185,129,0.1), transparent 50%);">
      <div class="geo" style="background:#d1fae5;color:#059669;">&#9679;</div>
      <div class="info">
        <div class="title">通用聊天分析</div>
        <div class="desc">跨游戏汇总、情感分析、高频话题提炼</div>
      </div>
      <span class="arr">&#8594;</span>
    </a>

  </div>

  <div class="divider">
    <span class="dia"></span><span class="rule"></span>
  </div>

  <div class="section-label">优化方向</div>
  <div class="cards">

    <a class="card" href="suggestions.html" style="--card-glow: linear-gradient(135deg, rgba(249,115,22,0.1), transparent 50%);">
      <div class="geo" style="background:#fff7ed;color:#ea580c;">&#9830;</div>
      <div class="info">
        <div class="title">修行那些年 · 产品优化建议</div>
        <div class="desc">基于玩家社群反馈的 13 条 P0-P2 优化方向</div>
      </div>
      <span class="arr">&#8594;</span>
    </a>

  </div>

  <footer class="footer">
    <span>gh.lirare.xyz</span>
  </footer>

</main>

<script>
// Matrix digital rain — theme-adapted
const canvas = document.getElementById('fx-canvas');
const ctx = canvas.getContext('2d');
const PALETTE = ['#f59e0b','#d946ef','#8b5cf6','#3b82f6','#ec4899','#f97316','#14b8a6'];
const FONT_SIZE = 13;
const COL_W = 16;
const BINARY = '01';
const FADE = 0.035;
const SPEED = 0.8;

let cols, drops = [];
let mouseX = -1000, mouseY = -1000;
let targetMX = 0, targetMY = 0;

document.addEventListener('mousemove', e => { targetMX = e.clientX; targetMY = e.clientY; });
document.addEventListener('mouseleave', () => { targetMX = -1000; targetMY = -1000; });

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / COL_W);
  drops = [];
  for (let i = 0; i < cols; i++) {
    drops.push({ y: Math.random() * -canvas.height, s: 0.5 + Math.random() * 0.8 });
  }
}
resize();
window.addEventListener('resize', resize);

const MOUSE_RADIUS = 200;

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function draw() {
  // Smooth mouse follow
  mouseX += (targetMX - mouseX) * 0.1;
  mouseY += (targetMY - mouseY) * 0.1;

  // Semi-transparent overlay for fade trail
  ctx.fillStyle = `rgba(250,250,249,${FADE})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = `${FONT_SIZE}px "Courier New", monospace`;
  ctx.textAlign = 'center';

  for (let i = 0; i < drops.length; i++) {
    const d = drops[i];
    const x = i * COL_W + COL_W / 2;

    // Distance from mouse to this column
    const dx = x - mouseX;
    const dy = d.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const near = Math.max(0, 1 - dist / MOUSE_RADIUS);

    // Draw streak: head char brighter, tail dimmer
    const streakLen = 2 + Math.floor(Math.random() * 3);
    for (let j = 0; j < streakLen; j++) {
      const ch = BINARY[Math.floor(Math.random() * 2)];
      const yPos = d.y - j * FONT_SIZE * 1.2;
      if (yPos < -FONT_SIZE || yPos > canvas.height + FONT_SIZE) continue;

      let alpha = j === 0 ? 0.5 : j === 1 ? 0.25 : 0.1;
      // Mouse glow: head char gets much brighter near cursor
      if (j === 0) alpha += near * 0.5;
      const color = PALETTE[(i + j) % PALETTE.length];
      ctx.fillStyle = hexToRgba(color, alpha);
      ctx.fillText(ch, x, yPos);
    }

    // Speed up near cursor
    d.y += FONT_SIZE * SPEED * d.s * (1 + near * 0.6);

    if (d.y > canvas.height + FONT_SIZE * 4) {
      d.y = -FONT_SIZE * (2 + Math.random() * 10);
      d.s = 0.5 + Math.random() * 0.8;
    }
  }

  // Mouse glow halo
  if (mouseX > 0 && mouseY > 0 && mouseX < canvas.width && mouseY < canvas.height) {
    const grad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, MOUSE_RADIUS);
    grad.addColorStop(0, 'rgba(245,158,11,0.03)');
    grad.addColorStop(0.5, 'rgba(139,92,246,0.02)');
    grad.addColorStop(1, 'rgba(250,250,249,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, MOUSE_RADIUS, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>

</body>
</html>
