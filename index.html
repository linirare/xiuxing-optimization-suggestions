<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gh.lirare.xyz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    min-height: 100vh;
    font-family: 'Inter', 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px 60px;
    color: rgba(255,255,255,0.75);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Ambient light glow */
  .ambient {
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse at center, rgba(99,102,241,0.08) 0%, rgba(168,85,247,0.04) 40%, transparent 70%);
    pointer-events: none;
    z-index: -1;
  }
  .ambient-b {
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse at center, rgba(251,191,36,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: -1;
  }

  .container { max-width: 640px; width: 100%; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 64px;
  }
  .header .domain {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 36px;
    font-weight: 300;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .header h1 strong {
    font-weight: 500;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .sub {
    color: rgba(255,255,255,0.3);
    font-size: 14px;
    font-weight: 300;
    margin-top: 12px;
    letter-spacing: 1px;
  }

  /* Section */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    margin-bottom: 20px;
    padding-left: 4px;
  }
  .links { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 20px 24px;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 18px;
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .card:hover {
    border-color: rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    transform: translateY(-1px);
  }
  .card:hover::before {
    opacity: 1;
  }
  .card:active {
    transform: translateY(0);
    transition-duration: 0.1s;
  }

  /* Card icon */
  .card .icon-wrap {
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    position: relative;
    flex-shrink: 0;
  }
  .card .icon-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    opacity: 0.15;
  }
  .card .icon-reports {
    background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.15));
    border: 1px solid rgba(99,102,241,0.2);
  }
  .card .icon-chat {
    background: linear-gradient(135deg, rgba(236,72,153,0.15), rgba(244,63,94,0.15));
    border: 1px solid rgba(236,72,153,0.2);
  }
  .card .icon-suggest {
    background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(245,158,11,0.15));
    border: 1px solid rgba(251,191,36,0.2);
  }

  /* Card body */
  .card .body { flex: 1; min-width: 0; }
  .card .title {
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    margin-bottom: 3px;
    line-height: 1.4;
  }
  .card .desc {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    line-height: 1.6;
    font-weight: 300;
  }
  .card .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .card .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }
  .tag-report {
    background: rgba(99,102,241,0.1);
    color: rgba(129,140,248,0.7);
  }
  .tag-chat {
    background: rgba(236,72,153,0.1);
    color: rgba(244,114,182,0.7);
  }
  .tag-suggest {
    background: rgba(251,191,36,0.1);
    color: rgba(251,191,36,0.7);
  }
  .card .arrow {
    font-size: 14px;
    color: rgba(255,255,255,0.15);
    flex-shrink: 0;
    transition: all 0.3s ease;
  }
  .card:hover .arrow {
    color: rgba(255,255,255,0.5);
    transform: translateX(3px);
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 48px 0 36px;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  }

  /* Footer */
  .footer {
    text-align: center;
  }
  .footer p {
    color: rgba(255,255,255,0.15);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1.5px;
  }
  .footer a {
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer a:hover {
    color: rgba(255,255,255,0.45);
  }

  @media (max-width: 500px) {
    body { padding: 48px 16px 40px; }
    .header { margin-bottom: 44px; }
    .header h1 { font-size: 28px; }
    .card { padding: 16px 18px; gap: 14px; }
    .card .icon-wrap { width: 38px; height: 38px; min-width: 38px; font-size: 15px; }
    .card .arrow { display: none; }
  }
</style>
</head>
<body>

<div class="ambient"></div>
<div class="ambient-b"></div>

<div class="container">
  <div class="header">
    <div class="domain">gh.lirare.xyz</div>
    <h1>数据 · <strong>洞察</strong> · 产品</h1>
    <div class="sub">数据分析与产品优化报告集</div>
  </div>

  <div class="section-label">报告与建议</div>

  <div class="links">
    <a class="card" href="https://linirare.github.io/xiuxing-chat-report/" target="_blank">
      <span class="icon-wrap icon-reports">📊</span>
      <div class="body">
        <div class="title">玩家聊天数据分析报告</div>
        <div class="desc">修行那些年 · 活跃度 / 话题分布 / 关键词趋势</div>
        <div class="meta">
          <span class="tag tag-report">数据报告</span>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="https://linirare.github.io/chat-analysis-report/" target="_blank">
      <span class="icon-wrap icon-chat">💬</span>
      <div class="body">
        <div class="title">通用聊天分析报告</div>
        <div class="desc">多游戏汇总 · 情感分析 / 高频话题 / 反馈提炼</div>
        <div class="meta">
          <span class="tag tag-chat">聊天分析</span>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="suggestions.html">
      <span class="icon-wrap icon-suggest">✦</span>
      <div class="body">
        <div class="title">产品优化建议</div>
        <div class="desc">修行那些年 · 基于玩家社群反馈的 13 条 P0-P2 优化建议</div>
        <div class="meta">
          <span class="tag tag-suggest">产品建议</span>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>

  <div class="divider">
    <span class="divider-line"></span>
  </div>

  <div class="footer">
    <p><a href="https://github.com/linirare/xiuxing-optimization-suggestions">GitHub Pages</a> · gh.lirare.xyz</p>
  </div>
</div>

</body>
</html>
