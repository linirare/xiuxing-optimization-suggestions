<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ln.lirare.xyz · 导航</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    min-height: 100vh;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #333;
  }
  .container { max-width: 640px; width: 100%; }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 2px;
  }
  .header .sub {
    color: #999;
    font-size: 13px;
    margin-top: 6px;
  }
  .links { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: #fff;
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 16px 20px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border-color: #ccc;
  }
  .card .title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .card .desc {
    font-size: 13px;
    color: #888;
    line-height: 1.5;
  }
  .card .url {
    font-size: 11px;
    color: #aaa;
    margin-top: 6px;
    word-break: break-all;
  }
  .footer {
    margin-top: 32px;
    text-align: center;
    color: #bbb;
    font-size: 11px;
    letter-spacing: 1px;
  }
  @media (max-width: 500px) {
    body { padding: 16px; }
    .card { padding: 14px 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📋 导航</h1>
    <div class="sub">数据分析与报告集合</div>
  </div>
  <div class="links">
    <a class="card" href="https://linirare.github.io/xiuxing-chat-report/" target="_blank">
      <div class="title">📊 修行那些年 · 玩家聊天数据分析报告</div>
      <div class="desc">全周期聊天记录分析，包含玩家活跃度、话题分布、关键词趋势等数据可视化报告。</div>
      <div class="url">linirare.github.io/xiuxing-chat-report/</div>
    </a>
    <a class="card" href="https://linirare.github.io/chat-analysis-report/" target="_blank">
      <div class="title">💬 通用聊天分析报告</div>
      <div class="desc">多游戏聊天记录汇总分析，涵盖情感分析、高频话题、玩家反馈提炼等。</div>
      <div class="url">linirare.github.io/chat-analysis-report/</div>
    </a>
  </div>
  <div class="footer">gh.lirare.xyz</div>
</div>
</body>
</html>
