<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gh.lirare.xyz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300;400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #050508;
  }

  body {
    background: var(--bg);
    font-family: 'Inter', 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #fff;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    cursor: none;
    overflow-x: hidden;
  }

  /* ===== Custom Cursor ===== */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
    transition: width 0.2s, height 0.2s;
  }
  .cursor-ring {
    position: fixed;
    width: 40px; height: 40px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, border-color 0.3s;
  }
  .cursor-ring.hover {
    width: 64px; height: 64px;
    border-color: rgba(255,255,255,0.5);
  }

  /* ===== Light Source ===== */
  .ambient-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 55vh;
    background: radial-gradient(ellipse at 50% 100%, rgba(180,180,200,0.07) 0%, rgba(100,100,130,0.03) 35%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .ambient-top {
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse at 50% 0%, rgba(160,160,200,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== Menu Toggle ===== */
  .menu-btn {
    position: fixed;
    top: 40px; left: 40px;
    z-index: 100;
    width: 44px; height: 44px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
    background: none; border: none;
    cursor: none;
    padding: 0;
  }
  .menu-btn span {
    display: block;
    width: 22px; height: 1px;
    background: rgba(255,255,255,0.5);
    transition: all 0.3s ease;
    transform-origin: center;
  }
  .menu-btn:hover span { background: rgba(255,255,255,0.9); }

  /* ===== Main Layout ===== */
  .main {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 16vh 48px 10vh;
  }

  /* ===== Logo / Header ===== */
  .logo-wrap {
    margin-bottom: 20vh;
    position: relative;
  }

  .logo {
    font-size: clamp(3.5rem, 8vw, 6.5rem);
    font-weight: 200;
    letter-spacing: -0.03em;
    line-height: 0.95;
    color: #fff;
    position: relative;
    display: inline-block;
    will-change: transform;
  }

  .logo-shadow {
    position: absolute;
    bottom: -60px;
    left: 0;
    width: 100%;
    height: 120px;
    background: linear-gradient(to top, rgba(180,180,210,0.12) 0%, transparent 100%);
    filter: blur(30px);
    pointer-events: none;
  }

  /* ===== Project List ===== */
  .projects {
    display: flex;
    flex-direction: column;
  }

  .project {
    position: relative;
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
    gap: 32px;
    padding: 32px 0;
    text-decoration: none;
    color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: all 0.4s ease;
    will-change: transform;
  }

  .project .num {
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.18);
    transition: color 0.4s ease;
  }

  .project .info { min-width: 0; }

  .project .title {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
    transition: all 0.4s ease;
  }

  .project .desc {
    font-size: 0.78rem;
    font-weight: 300;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.02em;
    transition: color 0.4s ease;
  }

  .project .arrow {
    font-size: 1.1rem;
    font-weight: 200;
    color: rgba(255,255,255,0.15);
    transition: all 0.4s ease;
  }

  .project:hover {
    padding-left: 16px;
    border-bottom-color: rgba(255,255,255,0.12);
  }
  .project:hover .num { color: rgba(255,255,255,0.5); }
  .project:hover .title { letter-spacing: 0.01em; }
  .project:hover .desc { color: rgba(255,255,255,0.5); }
  .project:hover .arrow { color: rgba(255,255,255,0.6); transform: translateX(4px); }

  /* ===== Glass shard canvas ===== */
  #glass-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.5;
  }

  /* ===== Footer ===== */
  .footer {
    margin-top: 16vh;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.15);
  }
  .footer a { color: inherit; text-decoration: none; transition: color 0.3s; }
  .footer a:hover { color: rgba(255,255,255,0.4); }

  @media (max-width: 768px) {
    body { cursor: auto; }
    .cursor, .cursor-ring { display: none; }
    .main { padding: 10vh 24px 8vh; }
    .logo-wrap { margin-bottom: 12vh; }
    .logo { font-size: clamp(2.5rem, 10vw, 4rem); }
    .project { grid-template-columns: 32px 1fr; gap: 16px; padding: 24px 0; }
    .project .arrow { display: none; }
    .project:hover { padding-left: 0; }
    .menu-btn { top: 24px; left: 24px; }
  }
</style>
</head>
<body>

  <footer class="footer">

<script>
  // ===== Custom Cursor =====
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let cx = 0, cy = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', (e) => {
    cx = e.clientX; cy = e.clientY;
    cursor.style.left = cx + 'px';
    cursor.style.top = cy + 'px';
  });

  function animateRing() {
    rx += (cx - rx) * 0.12;
    ry += (cy - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();

  // Ring hover effect on links
  document.querySelectorAll('a, .menu-btn').forEach(el => {
    el.addEventListener('mouseenter', () => ring.classList.add('hover'));
    el.addEventListener('mouseleave', () => ring.classList.remove('hover'));
  });

  // ===== Glass Shard Canvas =====
  const canvas = document.getElementById('glass-canvas');
  const ctx = canvas.getContext('2d');
  let shards = [];
  let mouseX = -1000, mouseY = -1000;
  let targetMX = 0, targetMY = 0;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Create shards
  function createShards() {
    shards = [];
    const cols = 12, rows = 8;
    const w = canvas.width / cols;
    const h = canvas.height / rows;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        shards.push({
          x: c * w + w/2,
          y: r * h + h/2,
          ox: c * w + w/2,
          oy: r * h + h/2,
          w: w + 2,
          h: h + 2,
          vx: 0, vy: 0,
          alpha: 0
        });
      }
    }
  }
  createShards();
  window.addEventListener('resize', createShards);

  document.addEventListener('mousemove', (e) => {
    targetMX = e.clientX;
    targetMY = e.clientY;
  });

  function draw(time) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    mouseX += (targetMX - mouseX) * 0.08;
    mouseY += (targetMY - mouseY) * 0.08;

    const maxDist = 320;
    const maxAlpha = 0.12;

    for (let s of shards) {
      const dx = s.ox - mouseX;
      const dy = s.oy - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      let alpha = 0;
      if (dist < maxDist) {
        alpha = (1 - dist / maxDist) * maxAlpha;
        const angle = Math.atan2(dy, dx);
        const push = (1 - dist / maxDist) * 12;
        s.x = s.ox + Math.cos(angle) * push;
        s.y = s.oy + Math.sin(angle) * push;
      } else {
        s.x += (s.ox - s.x) * 0.1;
        s.y += (s.oy - s.y) * 0.1;
      }

      s.alpha += (alpha - s.alpha) * 0.15;

      if (s.alpha > 0.003) {
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fillRect(s.x - s.w/2, s.y - s.h/2, s.w, s.h);
      }
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  // ===== Logo Parallax =====
  const logo = document.getElementById('logo');
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 8;
    const y = (e.clientY / window.innerHeight - 0.5) * 6;
    logo.style.transform = `translate(${x}px, ${y}px)`;
  });
</script>
